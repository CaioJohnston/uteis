<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .u   { fill: #fafaf8; }
    .dot { fill: #c2652a; }
    @media (prefers-color-scheme: light) {
      .u   { fill: #0c0b0a; }
      .dot { fill: #d96b28; }
    }
  </style>
  <text
    x="16"
    y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
  ><tspan class="u">ú</tspan><tspan class="dot">.</tspan></text>
